openapi: 3.0.0
info:
  title: API de Empréstimos - Sistema de Biblioteca
  version: "1.0.0"
paths:
  /emprestimos:
    post:
      summary: Registra um novo empréstimo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                livro_id:
                  type: integer
                usuario_id:
                  type: integer
              example:
                livro_id: 42
                usuario_id: 7
      responses:
        "201":
          description: Empréstimo registrado com sucesso
          content:
            application/json:
              example:
                id: 101
                livro_id: 42
                usuario_id: 7
                data_devolucao: "2026-07-20"