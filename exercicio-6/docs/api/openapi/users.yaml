openapi: 3.0.0
info:
  title: API de Gerenciamento de Usuários
  version: "1.0.0"
paths:
  /users:
    get:
      summary: Lista todos os usuários
      responses:
        "200":
          description: Lista de usuários retornada com sucesso
    post:
      summary: Cria um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                email:
                  type: string
      responses:
        "201":
          description: Usuário criado com sucesso